{% extends 'market/admin_base.html' %}
{% load static %}

{% block admin_content %}
<style>
    .edit-page-wrapper {
        max-width: 900px;
        margin: 0 auto;
    }

    .edit-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
    }

    .edit-back-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: #aaa;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.2s;
        flex-shrink: 0;
    }

    .edit-back-btn:hover {
        background: #222;
        color: white;
    }

    .edit-header-text h1 {
        font-size: 22px;
        font-weight: 800;
        color: #fff;
        margin: 0 0 4px;
    }

    .edit-header-text p {
        font-size: 13px;
        color: #555;
        margin: 0;
    }

    .edit-grid {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 24px;
    }

    .edit-card {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 16px;
        padding: 24px;
    }

    .edit-card-title {
        font-size: 13px;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #1e1e1e;
    }

    .field-group {
        margin-bottom: 18px;
    }

    .field-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #666;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    .field-input {
        width: 100%;
        background: #0d0d0d;
        border: 1px solid #222;
        border-radius: 10px;
        padding: 12px 14px;
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        box-sizing: border-box;
        font-family: inherit;
    }

    .field-input:focus {
        border-color: var(--primary-yellow);
    }

    textarea.field-input {
        resize: vertical;
        min-height: 100px;
    }

    select.field-input option {
        background: #1a1a1a;
    }

    .price-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    /* Image upload area */
    .image-upload-area {
        border: 2px dashed #252525;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s;
        margin-bottom: 16px;
        position: relative;
    }

    .image-upload-area:hover {
        border-color: var(--primary-yellow);
    }

    .image-upload-area img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .image-upload-area .upload-placeholder {
        padding: 20px 0;
    }

    .image-upload-area .upload-placeholder i {
        font-size: 28px;
        color: #333;
        margin-bottom: 8px;
        display: block;
    }

    .image-upload-area .upload-placeholder p {
        color: #444;
        font-size: 12px;
        margin: 0;
    }

    #image-file-input {
        display: none;
    }

    .image-change-label {
        font-size: 11px;
        color: #555;
        text-align: center;
        margin-top: 8px;
    }

    /* Action buttons */
    .edit-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
    }

    .btn-save {
        flex: 1;
        background: var(--primary-yellow);
        color: #000;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        transition: transform 0.15s;
    }

    .btn-save:hover {
        transform: scale(1.02);
    }

    .btn-cancel-edit {
        padding: 14px 20px;
        background: transparent;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        color: #666;
        text-decoration: none;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
    }

    .btn-cancel-edit:hover {
        border-color: #444;
        color: #aaa;
    }

    /* New/Yangi badge toggle */
    .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #1a1a1a;
    }

    .toggle-row:last-child {
        border-bottom: none;
    }

    .toggle-label {
        font-size: 13px;
        color: #aaa;
    }

    .toggle-switch {
        position: relative;
        width: 44px;
        height: 24px;
    }

    .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .toggle-slider {
        position: absolute;
        inset: 0;
        background: #222;
        border-radius: 24px;
        cursor: pointer;
        transition: 0.2s;
        border: 1px solid #333;
    }

    .toggle-slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        bottom: 3px;
        background: #555;
        border-radius: 50%;
        transition: 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
        background: var(--primary-yellow);
        border-color: var(--primary-yellow);
    }

    .toggle-switch input:checked+.toggle-slider::before {
        transform: translateX(20px);
        background: #000;
    }

    @media (max-width: 768px) {
        .edit-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="edit-page-wrapper">
    <div class="edit-header">
        <a href="{% url 'market:admin_dashboard' %}" class="edit-back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="edit-header-text">
            <h1>Mahsulotni tahrirlash</h1>
            <p>ID: #{{ product.pk }} — {{ product.name|truncatechars:40 }}</p>
        </div>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="edit-grid">

            <!-- Left column: Main info -->
            <div>
                <div class="edit-card" style="margin-bottom: 20px;">
                    <div class="edit-card-title"><i class="fas fa-info-circle"
                            style="margin-right:6px;color:var(--primary-yellow)"></i>Asosiy ma'lumotlar</div>

                    <div class="field-group">
                        <label>Mahsulot nomi *</label>
                        <input type="text" name="name" class="field-input" value="{{ product.name }}" required>
                    </div>

                    <div class="field-group">
                        <label>Brend</label>
                        <input type="text" name="brand" class="field-input" value="{{ product.brand|default:'' }}"
                            placeholder="Masalan: Samsung">
                    </div>

                    <div class="field-group">
                        <label>Kategoriya *</label>
                        <select name="category" class="field-input" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if cat.id == product.category.id %}selected{% endif %}>{{
                                cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="field-group">
                        <label>Tavsif *</label>
                        <textarea name="description" class="field-input" rows="5"
                            required>{{ product.description }}</textarea>
                    </div>
                </div>

                <div class="edit-card">
                    <div class="edit-card-title"><i class="fas fa-tag"
                            style="margin-right:6px;color:var(--primary-yellow)"></i>Narx va ombor</div>
                    <div class="price-row">
                        <div class="field-group">
                            <label>Asosiy narx (so'm) *</label>
                            <input type="number" name="price" class="field-input" value="{{ product.price }}"
                                step="0.01" required>
                        </div>
                        <div class="field-group">
                            <label>Eski narx (chegirma uchun)</label>
                            <input type="number" name="old_price" class="field-input"
                                value="{{ product.old_price|default:'' }}" step="0.01" placeholder="0">
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Ombordagi soni *</label>
                        <input type="number" name="stock" class="field-input" value="{{ product.stock }}" required>
                    </div>
                </div>
            </div>

            <!-- Right column: Image + settings -->
            <div>
                <div class="edit-card" style="margin-bottom: 20px;">
                    <div class="edit-card-title"><i class="fas fa-image"
                            style="margin-right:6px;color:var(--primary-yellow)"></i>Mahsulot rasmi</div>
                    <div class="image-upload-area" onclick="document.getElementById('image-file-input').click()">
                        <img src="{{ product.get_image }}" alt="{{ product.name }}" id="img-preview">
                    </div>

                    <div class="field-group" style="margin-top: 15px;">
                        <label>Yangi rasm (fayl)</label>
                        <input type="file" name="image" id="image-file-input" class="field-input" accept="image/*"
                            onchange="previewImage(this)">
                    </div>

                    <div class="field-group" style="margin-top: 15px;">
                        <label>Rasm URL orqali</label>
                        <input type="url" name="image_url" id="image-url-input" class="field-input"
                            value="{{ product.image_url|default:'' }}" placeholder="https://..."
                            oninput="previewUrl(this.value)">
                    </div>

                    <script>
                        function previewImage(input) {
                            if (input.files && input.files[0]) {
                                var reader = new FileReader();
                                reader.onload = function (e) {
                                    document.getElementById('img-preview').src = e.target.result;
                                };
                                reader.readAsDataURL(input.files[0]);
                            }
                        }
                        function previewUrl(url) {
                            if (url) {
                                document.getElementById('img-preview').src = url;
                            } else {
                                document.getElementById('img-preview').src = "{{ product.get_image }}";
                            }
                        }
                    </script>
                </div>

                <div class="edit-card">
                    <div class="edit-card-title"><i class="fas fa-sliders-h"
                            style="margin-right:6px;color:var(--primary-yellow)"></i>Parametrlar</div>
                    <div class="toggle-row">
                        <span class="toggle-label">Yangi mahsulot belgilash</span>
                        <label class="toggle-switch">
                            <input type="checkbox" name="is_new" {% if product.is_new %}checked{% endif %}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="edit-actions">
                    <button type="submit" class="btn-save"><i class="fas fa-save"></i> Saqlash</button>
                    <a href="{% url 'market:admin_dashboard' %}" class="btn-cancel-edit"><i class="fas fa-times"></i>
                        Bekor</a>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const area = input.closest ? input.parentElement.querySelector('.image-upload-area') : input.previousElementSibling;
                const uploadArea = document.querySelector('.image-upload-area');
                uploadArea.innerHTML = `<img src="${e.target.result}" style="width:100%;height:160px;object-fit:cover;border-radius:8px;">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
